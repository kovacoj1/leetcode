name: Python CI

on:
  push:
    branches: [main]
    paths:
      - "problems/**/*.py"
      - ".github/workflows/python-ci.yml"
      - "ruff.toml"
      - ".editorconfig"
  pull_request:
    paths:
      - "problems/**/*.py"
      - ".github/workflows/python-ci.yml"
      - "ruff.toml"
      - ".editorconfig"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Collect changed Python files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: problems/**/*.py

      - name: Skip when no Python files changed
        if: steps.changed-files.outputs.any_changed != 'true'
        run: |
          echo "No Python solution files changed."

      - uses: astral-sh/ruff-action@v3
        if: steps.changed-files.outputs.any_changed == 'true'
        with:
          args: check --select=E,F,W,UP,I --ignore=E501 ${{ steps.changed-files.outputs.all_changed_files }}

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Collect changed Python files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: problems/**/*.py

      - name: Skip when no Python files changed
        if: steps.changed-files.outputs.any_changed != 'true'
        run: |
          echo "No Python solution files changed."

      - uses: astral-sh/ruff-action@v3
        if: steps.changed-files.outputs.any_changed == 'true'
        with:
          args: format --check ${{ steps.changed-files.outputs.all_changed_files }}
